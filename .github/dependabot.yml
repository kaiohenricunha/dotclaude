version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: [dependencies, npm]
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      vitest:
        patterns:
          - vitest
          - "@vitest/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    # Consumer templates pin their own action SHAs; sweep them too so
    # downstream scaffolds don't go stale.
    directory: /plugins/dotclaude/templates/workflows
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions, templates]
    commit-message:
      prefix: chore(deps)
      include: scope
