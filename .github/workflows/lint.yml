name: lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: shellcheck (warning-severity gate)
        run: |
          shellcheck --severity=warning -x \
            bootstrap.sh \
            sync.sh \
            plugins/dotclaude/scripts/*.sh \
            plugins/dotclaude/scripts/lib/*.sh \
            plugins/dotclaude/hooks/*.sh \
            plugins/dotclaude/tests/*.sh \
            plugins/dotclaude/templates/claude/hooks/*.sh \
            plugins/dotclaude/templates/githooks/pre-commit

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#.claude/worktrees"

  jsdoc-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - run: node scripts/check-jsdoc-coverage.mjs plugins/dotclaude/src

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      # Check only JSON/YAML/MD — the .mjs source is deliberately lightly formatted
      # (see .prettierrc.json); running on .mjs today would churn a lot.
      - run: npx --yes prettier@3 --check "**/*.{json,yml,yaml,md}" --ignore-path .gitignore --ignore-path .prettierignore --ignore-unknown
